<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devolution - UI/UX Concept</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; height: 100dvh; width: 100vw; display: flex; justify-content: center; align-items: center; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script>
(async () => {

const W = 480;
const H = 850;

const app = new PIXI.Application();
await app.init({ background: '#0e0e1a', width: W, height: H, antialias: true });
document.body.appendChild(app.canvas);

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  app.canvas.style.width = W * s + 'px';
  app.canvas.style.height = H * s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// Helpers
// ============================================================
const C = {
  bg: 0x0e0e1a, panel: 0x16162e, card: 0x1e1e3a, border: 0x2a2a4a,
  accent: 0x4a9eff, taming: 0x4a9eff, escape: 0xff6b6b,
  hp: 0x7bed9f, hpLow: 0xff6b6b, xp: 0xffd700, text: 0xe8e8ff,
  dim: 0x8888aa, dimmer: 0x555577,
  water: 0x4a9eff, fire: 0xff6347, grass: 0x7bed9f, dark: 0x9966cc,
};

function hex(c) { return '#' + c.toString(16).padStart(6, '0'); }

function lbl(text, size, color, bold) {
  return new PIXI.Text({ text, style: {
    fontFamily: 'Arial, sans-serif', fontSize: size,
    fill: typeof color === 'number' ? hex(color) : color,
    fontWeight: bold ? 'bold' : 'normal',
  }});
}

function mkBtn(x, y, w, h, text, fillC, borderC) {
  const c = new PIXI.Container();
  const bg = new PIXI.Graphics();
  bg.roundRect(0, 0, w, h, 8).fill({ color: fillC || C.card });
  if (borderC) bg.stroke({ color: borderC, width: 1.5 });
  c.addChild(bg);
  const t = lbl(text, 14, C.text, true);
  t.anchor = { x: 0.5, y: 0.5 }; t.x = w / 2; t.y = h / 2;
  c.addChild(t);
  c.x = x; c.y = y;
  c.eventMode = 'static'; c.cursor = 'pointer';
  return c;
}

function mkGauge(x, y, w, label, ratio, color) {
  const c = new PIXI.Container(); c.x = x; c.y = y;
  c.addChild(lbl(label, 11, C.dim));
  const bx = 40, bw = w - 74, bh = 14;
  c.addChild(new PIXI.Graphics().roundRect(bx, 1, bw, bh, 7).fill({ color: 0x12122a }));
  c.addChild(new PIXI.Graphics().roundRect(bx, 1, bw * ratio, bh, 7).fill({ color }));
  const p = lbl(Math.round(ratio * 100) + '%', 10, C.dim);
  p.x = bx + bw + 6; p.y = 1; c.addChild(p);
  return c;
}

// Monster sprite with face features per type
function monster(size, color, type) {
  const c = new PIXI.Container();
  const r = size / 2;
  const g = new PIXI.Graphics();

  // Body
  g.circle(0, 0, r).fill({ color });
  g.circle(-r * 0.3, -r * 0.25, r * 0.18).fill({ color: 0xffffff, alpha: 0.2 });

  // Eyes
  const ey = -r * 0.15;
  g.circle(-r * 0.25, ey, r * 0.12).fill({ color: 0xffffff });
  g.circle(r * 0.25, ey, r * 0.12).fill({ color: 0xffffff });
  g.circle(-r * 0.22, ey - r * 0.02, r * 0.06).fill({ color: 0x111122 });
  g.circle(r * 0.28, ey - r * 0.02, r * 0.06).fill({ color: 0x111122 });

  if (type === 'water') {
    g.circle(-r * 0.5, -r * 0.7, r * 0.2).fill({ color: 0x3a8adf });
    g.circle(r * 0.5, -r * 0.7, r * 0.2).fill({ color: 0x3a8adf });
    g.moveTo(-r * 0.2, r * 0.2).quadraticCurveTo(0, r * 0.45, r * 0.2, r * 0.2)
      .stroke({ color: 0x222244, width: 2 });
  } else if (type === 'fire') {
    g.moveTo(-r * 0.3, -r * 0.8).lineTo(-r * 0.5, -r * 1.2).lineTo(-r * 0.1, -r * 0.85)
      .fill({ color: 0xff9933 });
    g.moveTo(r * 0.3, -r * 0.8).lineTo(r * 0.5, -r * 1.2).lineTo(r * 0.1, -r * 0.85)
      .fill({ color: 0xff9933 });
    g.moveTo(-r * 0.25, r * 0.2).lineTo(r * 0.25, r * 0.2)
      .stroke({ color: 0x222244, width: 2 });
  } else if (type === 'grass') {
    g.ellipse(0, -r * 0.9, r * 0.35, r * 0.2).fill({ color: 0x5acd73 });
    g.ellipse(0, -r * 1.1, r * 0.15, r * 0.12).fill({ color: 0x5acd73 });
    g.circle(0, r * 0.25, r * 0.08).fill({ color: 0xff8888, alpha: 0.6 });
  } else {
    // Enemy
    g.moveTo(-r * 0.6, -r * 0.6).lineTo(-r * 0.4, -r * 1.1).lineTo(-r * 0.2, -r * 0.6)
      .fill({ color });
    g.moveTo(r * 0.6, -r * 0.6).lineTo(r * 0.4, -r * 1.1).lineTo(r * 0.2, -r * 0.6)
      .fill({ color });
    g.moveTo(-r * 0.2, r * 0.3).lineTo(-r * 0.1, r * 0.45).lineTo(0, r * 0.3)
      .lineTo(r * 0.1, r * 0.45).lineTo(r * 0.2, r * 0.3)
      .stroke({ color: 0xffffff, width: 1.5 });
  }

  c.addChild(g);
  return c;
}

// Monster unit — showHp: false for enemies (gauges shown separately)
function monUnit(size, color, type, opts) {
  const c = new PIXI.Container();
  const mon = monster(size, color, type);
  c.addChild(mon);

  if (opts && opts.showHp) {
    const barW = size * 1.2;
    const barH = 6;
    const barY = -size / 2 - 14;

    c.addChild(new PIXI.Graphics().roundRect(-barW / 2, barY, barW, barH, 3).fill({ color: 0x12122a }));
    const ratio = opts.hp / opts.maxHp;
    const hpCol = ratio > 0.5 ? C.hp : ratio > 0.25 ? C.xp : C.hpLow;
    c.addChild(new PIXI.Graphics().roundRect(-barW / 2, barY, barW * ratio, barH, 3).fill({ color: hpCol }));
  }

  return c;
}

function egg(size, color) {
  const c = new PIXI.Container();
  const g = new PIXI.Graphics();
  g.ellipse(0, 0, size * 0.35, size * 0.45).fill({ color });
  g.ellipse(0, -size * 0.15, size * 0.12, size * 0.1).fill({ color: 0xffffff, alpha: 0.25 });
  c.addChild(g);
  return c;
}

// ============================================================
// Screen management
// ============================================================
const screens = {};
let curScr = null;

function mkScreen(name) {
  const c = new PIXI.Container();
  c.visible = false;
  app.stage.addChild(c);
  screens[name] = c;
  return c;
}

function show(name) {
  if (curScr) curScr.visible = false;
  curScr = screens[name];
  curScr.visible = true;
  updateNav(NAMES.indexOf(name));
}

const NAMES = ['combat', 'result', 'team', 'devo', 'gameover'];

const nav = new PIXI.Container();
nav.y = H - 16; nav.x = W / 2;
app.stage.addChild(nav);

function updateNav(idx) {
  nav.removeChildren();
  const gap = 14, sx = -(NAMES.length - 1) * gap / 2;
  NAMES.forEach((n, i) => {
    const d = new PIXI.Graphics();
    d.circle(sx + i * gap, 0, 3).fill({ color: i === idx ? C.accent : C.border });
    d.eventMode = 'static'; d.cursor = 'pointer';
    d.on('pointerdown', () => show(n));
    nav.addChild(d);
  });
}

// ============================================================
// 1. COMBAT SCREEN — Pokemon-style diagonal 1v1
// ============================================================
const combatScr = mkScreen('combat');

// ============================================================
// LAYOUT: Battle field 42% | Bench 5% | Actions 53%
// fieldH=360, benchH=40, bottomH=450 (total 850)
// ============================================================
const fieldH = 360;
const benchH = 40;
const bottomY = fieldH + benchH;

// --- Battle field ---
combatScr.addChild(new PIXI.Graphics().rect(0, 0, W, fieldH).fill({ color: C.panel }));

// Turn badge (top-right)
combatScr.addChild(new PIXI.Graphics().roundRect(W - 74, 8, 58, 22, 11).fill({ color: 0x12122a, alpha: 0.7 }));
combatScr.addChild(Object.assign(lbl('Turn 3', 10, C.dim), { x: W - 64, y: 11 }));

// --- Danmaku (弹幕) battle log ---
const danmakuLayer = new PIXI.Container();
danmakuLayer.y = 0;
combatScr.addChild(danmakuLayer);

// Mask to clip danmaku within field area top portion
const danmakuMask = new PIXI.Graphics();
danmakuMask.rect(0, 0, W, 70).fill({ color: 0xffffff });
combatScr.addChild(danmakuMask);
danmakuLayer.mask = danmakuMask;

const danmakuMessages = [
  { text: '야생 심연 늑대가 나타났다!', color: '#ffa502', y: 8 },
  { text: '잔잔한 빗소리가 주변에 퍼진다.', color: '#b0b0cc', y: 28 },
  { text: '귀가 빗소리 쪽으로 기울었다.', color: '#7fdbff', y: 48 },
  { text: '날카로운 발톱을 휘둘렀다!', color: '#ff6b6b', y: 14 },
  { text: '이슬요정이 피해를 받았다!', color: '#ff6b6b', y: 38 },
  { text: '서늘한 안개가 감싼다...', color: '#b0b0cc', y: 54 },
  { text: '경계심이 조금 풀렸다.', color: '#7fdbff', y: 22 },
  { text: '꼬리가 살짝 흔들렸다.', color: '#7bed9f', y: 42 },
];

const danmakuItems = [];
danmakuMessages.forEach((msg, i) => {
  const t = lbl(msg.text, 11, msg.color);
  t.alpha = 0.7;
  t.x = W + i * 220 + Math.random() * 100;
  t.y = msg.y;
  danmakuLayer.addChild(t);
  danmakuItems.push({ sprite: t, speed: 0.6 + Math.random() * 0.4, baseX: t.x });
});

// --- Enemy: top-right ---
const enemyPlatX = W * 0.66;
const enemyPlatY = 120;
combatScr.addChild(new PIXI.Graphics().ellipse(enemyPlatX, enemyPlatY + 48, 95, 20).fill({ color: 0x222244 }));

const enemyMon = monUnit(70, C.dark, 'enemy');
enemyMon.x = enemyPlatX; enemyMon.y = enemyPlatY;
combatScr.addChild(enemyMon);

// Enemy info (compact, below monster)
const eInfoX = enemyPlatX;
const eInfoY = enemyPlatY + 42;

// Name + Level
const eName = lbl('심연 늑대', 12, C.text, true);
eName.anchor = { x: 0.5, y: 0 }; eName.x = eInfoX; eName.y = eInfoY;
combatScr.addChild(eName);

// Mood tag (replaces gauges — shows combined intent)
const moodTag = new PIXI.Container();
moodTag.x = eInfoX; moodTag.y = eInfoY + 20;
const moodBg = new PIXI.Graphics();
moodBg.roundRect(-32, -2, 64, 20, 10).fill({ color: 0x7fdbff, alpha: 0.15 });
moodTag.addChild(moodBg);
const moodText = lbl('경계 중', 10, '#7fdbff');
moodText.anchor = { x: 0.5, y: 0 }; moodText.x = 0; moodText.y = 0;
moodTag.addChild(moodText);
combatScr.addChild(moodTag);

// --- Ally: bottom-left, back view ---
const allyPlatX = W * 0.3;
const allyPlatY = 280;
combatScr.addChild(new PIXI.Graphics().ellipse(allyPlatX, allyPlatY + 52, 110, 24).fill({ color: 0x1a1a3a }));

const allyMon = monUnit(90, C.water, 'water', { showHp: true, hp: 24, maxHp: 30 });
allyMon.x = allyPlatX; allyMon.y = allyPlatY;
allyMon.children[0].scale.x = -1;
combatScr.addChild(allyMon);

// Ally name + level (below ally, left-aligned)
const allyNameY = allyPlatY + 52;
combatScr.addChild(Object.assign(lbl('이슬요정', 13, C.text, true), { x: allyPlatX - 40, y: allyNameY }));
combatScr.addChild(Object.assign(lbl('Lv.3', 10, C.dim), { x: allyPlatX + 28, y: allyNameY + 2 }));

// --- Bench bar ---
combatScr.addChild(new PIXI.Graphics().rect(0, fieldH, W, benchH).fill({ color: 0x12122a }));
combatScr.addChild(new PIXI.Graphics().rect(0, fieldH, W, 1).fill({ color: C.border }));
combatScr.addChild(new PIXI.Graphics().rect(0, fieldH + benchH - 1, W, 1).fill({ color: C.border }));

combatScr.addChild(Object.assign(lbl('대기', 10, C.dimmer), { x: 16, y: fieldH + 12 }));

const benchAllies = [
  { name: '숯뭉이', hp: 25, max: 25, color: C.fire, type: 'fire' },
  { name: '잎사귀', hp: 18, max: 28, color: C.grass, type: 'grass' },
];
const BENCH_W = 110, BENCH_H2 = 30, BENCH_GAP = 8;
const benchStartX = W - (BENCH_W * 2 + BENCH_GAP) - 16;

benchAllies.forEach((a, i) => {
  const x = benchStartX + i * (BENCH_W + BENCH_GAP);
  const tab = new PIXI.Container(); tab.x = x; tab.y = fieldH + 5;

  tab.addChild(new PIXI.Graphics().roundRect(0, 0, BENCH_W, BENCH_H2, 6)
    .fill({ color: C.card }).stroke({ color: C.border, width: 1 }));

  const mini = monster(12, a.color, a.type);
  mini.x = 14; mini.y = BENCH_H2 / 2;
  tab.addChild(mini);

  tab.addChild(Object.assign(lbl(a.name, 10, C.dim), { x: 28, y: 2 }));
  const bw = 58;
  tab.addChild(new PIXI.Graphics().roundRect(28, 19, bw, 4, 2).fill({ color: 0x12122a }));
  tab.addChild(new PIXI.Graphics().roundRect(28, 19, bw * (a.hp / a.max), 4, 2).fill({ color: C.hp }));

  combatScr.addChild(tab);
});

// --- Bottom: Mode + Actions ---
combatScr.addChild(new PIXI.Graphics().rect(0, bottomY, W, H - bottomY).fill({ color: 0x16162b }));

// Mode toggle
const MY = bottomY + 12;
['순화 행동', '인간 교감'].forEach((m, i) => {
  const x = 16 + i * (W / 2 - 8), w = W / 2 - 24;
  const bg = new PIXI.Graphics(); bg.roundRect(x, MY, w, 38, 8);
  i === 0 ? bg.fill({ color: 0x2a3a6a }).stroke({ color: C.accent, width: 1.5 })
           : bg.fill({ color: C.card }).stroke({ color: C.border, width: 1 });
  combatScr.addChild(bg);
  const t = lbl(m, 14, i === 0 ? '#7fdbff' : C.dim, true);
  t.anchor = { x: 0.5, y: 0.5 }; t.x = x + w / 2; t.y = MY + 19;
  combatScr.addChild(t);
});

// Action buttons (3 large buttons)
const acts = [
  { name: '빗소리', axis: '청각', desc: '잔잔한 빗소리가 주변에 퍼진다.', ac: C.water },
  { name: '서늘한 안개', axis: '온도', desc: '서늘한 안개가 천천히 감싼다.', ac: C.fire },
  { name: '거리 유지', axis: '행동', desc: '조용히 거리를 유지하며 지켜본다.', ac: C.grass },
];
const AY = MY + 54, AH = 76, AG = 8;
acts.forEach((a, i) => {
  const y = AY + i * (AH + AG);
  const ct = new PIXI.Container(); ct.y = y;
  const bg = new PIXI.Graphics();
  bg.roundRect(16, 0, W - 32, AH, 12).fill({ color: C.card }).stroke({ color: C.border, width: 1 });
  ct.addChild(bg);

  // Axis color accent bar on left
  ct.addChild(new PIXI.Graphics().roundRect(16, 0, 4, AH, 12).fill({ color: a.ac, alpha: 0.6 }));

  const n = lbl(a.name, 17, '#d0d0ee', true); n.x = 32; n.y = 12; ct.addChild(n);
  ct.addChild(new PIXI.Graphics().roundRect(32 + n.width + 10, 12, 42, 22, 6).fill({ color: a.ac, alpha: 0.2 }));
  ct.addChild(Object.assign(lbl(a.axis, 12, '#9999bb'), { x: 32 + n.width + 16, y: 14 }));
  ct.addChild(Object.assign(lbl(a.desc, 12, C.dimmer), { x: 32, y: 44 }));
  combatScr.addChild(ct);
});

// ============================================================
// 2. RESULT
// ============================================================
const resultScr = mkScreen('result');
resultScr.addChild(new PIXI.Graphics().rect(0, 0, W, H).fill({ color: C.bg }));

resultScr.addChild(new PIXI.Graphics().roundRect(40, 100, W - 80, 100, 12)
  .fill({ color: 0x1a2a4a }).stroke({ color: C.accent, width: 2 }));

const vt = lbl('순화 성공!', 28, '#7fdbff', true);
vt.anchor = { x: 0.5, y: 0.5 }; vt.x = W / 2; vt.y = 130; resultScr.addChild(vt);
const cn2 = lbl('심연 늑대를 포획했다!', 14, C.dim);
cn2.anchor = { x: 0.5, y: 0.5 }; cn2.x = W / 2; cn2.y = 170; resultScr.addChild(cn2);

const cm = monster(70, C.dark, 'enemy'); cm.x = W / 2; cm.y = 280; resultScr.addChild(cm);

resultScr.addChild(Object.assign(lbl('경험치 획득', 14, C.dim, true), { x: 40, y: 360 }));

[
  { name: '이슬요정', xp: '+12 XP', color: C.water, type: 'water', r: 0.6 },
  { name: '숯뭉이', xp: '+8 XP', color: C.fire, type: 'fire', r: 0.75 },
].forEach((a, i) => {
  const y = 390 + i * 56;
  const row = new PIXI.Container(); row.y = y;
  row.addChild(new PIXI.Graphics().roundRect(40, 0, W - 80, 48, 8).fill({ color: C.card }));
  const s = monster(22, a.color, a.type); s.x = 68; s.y = 24; row.addChild(s);
  row.addChild(Object.assign(lbl(a.name, 13, C.text), { x: 92, y: 8 }));
  row.addChild(Object.assign(lbl(a.xp, 13, '#ffd700', true), { x: 92, y: 26 }));
  row.addChild(new PIXI.Graphics().roundRect(220, 20, 140, 8, 4).fill({ color: 0x12122a }));
  row.addChild(new PIXI.Graphics().roundRect(220, 20, 140 * a.r, 8, 4).fill({ color: C.xp }));
  resultScr.addChild(row);
});

const da = new PIXI.Container(); da.y = 520;
da.addChild(new PIXI.Graphics().roundRect(40, 0, W - 80, 48, 8)
  .fill({ color: 0x2a1a0a }).stroke({ color: 0xffd700, width: 1 }));
da.addChild(Object.assign(lbl('숯뭉이가 알 상태에 진입했습니다!', 13, '#ffd700'), { x: 60, y: 14 }));
resultScr.addChild(da);

const rnb = mkBtn(W / 2 - 80, 620, 160, 44, '팀 확인', 0x2a3a6a, C.accent);
resultScr.addChild(rnb);
rnb.on('pointerdown', () => show('team'));

// ============================================================
// 3. TEAM
// ============================================================
const teamScr = mkScreen('team');
teamScr.addChild(new PIXI.Graphics().rect(0, 0, W, H).fill({ color: C.bg }));

teamScr.addChild(Object.assign(lbl('내 팀', 22, C.text, true), { x: 24, y: 24 }));
teamScr.addChild(new PIXI.Graphics().roundRect(W - 100, 24, 80, 28, 6).fill({ color: C.card }));
teamScr.addChild(Object.assign(lbl('도감 4/12', 11, C.dim), { x: W - 90, y: 30 }));

const tAllies = [
  { name: '이슬요정', lv: 3, hp: '30/30', xp: 0.7, color: C.water, type: 'water', st: 'active' },
  { name: '숯뭉이', lv: 2, hp: '--', xp: 1.0, color: C.fire, type: 'fire', st: 'egg' },
  { name: '잎사귀요정', lv: 1, hp: '28/28', xp: 0.3, color: C.grass, type: 'grass', st: 'active' },
];
const CRD_Y = 70, CRD_H = 120, CRD_G = 10;

tAllies.forEach((a, i) => {
  const y = CRD_Y + i * (CRD_H + CRD_G);
  const card = new PIXI.Container(); card.y = y;
  const bg = new PIXI.Graphics();
  bg.roundRect(16, 0, W - 32, CRD_H, 12).fill({ color: C.card });
  a.st === 'egg' ? bg.stroke({ color: C.xp, width: 1.5 }) : bg.stroke({ color: C.border, width: 1 });
  card.addChild(bg);

  if (a.st === 'egg') {
    const e = egg(50, a.color); e.x = 56; e.y = CRD_H / 2; card.addChild(e);
    card.addChild(new PIXI.Graphics().roundRect(30, CRD_H - 28, 52, 18, 4).fill({ color: 0x12122a }));
    card.addChild(Object.assign(lbl('0:12', 10, '#ffd700'), { x: 42, y: CRD_H - 26 }));
  } else {
    const s = monster(40, a.color, a.type); s.x = 56; s.y = CRD_H / 2; card.addChild(s);
  }

  const n = lbl(a.name, 15, C.text, true); n.x = 96; n.y = 16; card.addChild(n);
  card.addChild(Object.assign(lbl('Lv.' + a.lv, 11, C.dim), { x: 96 + n.width + 8, y: 20 }));

  if (a.st === 'egg') {
    card.addChild(new PIXI.Graphics().roundRect(96, 42, 52, 20, 4).fill({ color: 0x3a2a0a }));
    card.addChild(Object.assign(lbl('알 상태', 10, '#ffd700'), { x: 104, y: 45 }));
  } else {
    card.addChild(Object.assign(lbl('HP ' + a.hp, 11, C.dim), { x: 96, y: 44 }));
    card.addChild(new PIXI.Graphics().roundRect(96, 64, 160, 8, 4).fill({ color: 0x12122a }));
    const parts = a.hp.split('/');
    card.addChild(new PIXI.Graphics().roundRect(96, 64, 160 * (parseInt(parts[0]) / parseInt(parts[1])), 8, 4).fill({ color: C.hp }));
  }

  card.addChild(Object.assign(lbl('XP', 10, C.dimmer), { x: 96, y: 82 }));
  card.addChild(new PIXI.Graphics().roundRect(120, 84, 136, 6, 3).fill({ color: 0x12122a }));

  if (a.st === 'active') {

    dots.circle(W - 60, CRD_H / 2, 3).fill({ color: C.dim });

// ============================================================
// Init & animation
// ============================================================
show('combat');

let tick = 0;
app.ticker.add((ticker) => {
  tick += 0.02;
  const dt = ticker.deltaTime;

  // Enemy idle breathing
  enemyMon.y = enemyPlatY + Math.sin(tick) * 3;
  enemyMon.children[0].scale.y = 1 + Math.sin(tick * 0.8) * 0.015;

  // Ally idle breathing
  allyMon.y = allyPlatY + Math.sin(tick + 1.5) * 3;
  allyMon.children[0].scale.y = 1 + Math.sin(tick * 0.9 + 1) * 0.012;

  // Danmaku scroll (right → left, loop)
  danmakuItems.forEach(d => {
    d.sprite.x -= d.speed * dt;
    if (d.sprite.x < -300) {
      d.sprite.x = W + 50 + Math.random() * 150;
    }
  });
});

})();
