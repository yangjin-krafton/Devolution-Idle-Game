<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Monster Candidate Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }

  /* Layout */
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #16213e; overflow-y: auto; border-right: 1px solid #333; }
  .main { margin-left: 260px; padding: 24px; }

  /* Sidebar */
  .sidebar h2 { padding: 16px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .monster-btn {
    display: block; width: 100%; padding: 12px 16px; border: none; background: none;
    color: #ccc; text-align: left; cursor: pointer; font-size: 14px; transition: background 0.15s;
  }
  .monster-btn:hover { background: #1a3a5c; }
  .monster-btn.active { background: #0f3460; color: #fff; border-left: 3px solid #e94560; }
  .monster-btn .sub { font-size: 11px; color: #777; }

  /* Form group */
  .form-group { margin-bottom: 32px; }
  .form-group h2 {
    font-size: 18px; margin-bottom: 4px; color: #e94560;
    display: flex; align-items: center; gap: 8px;
  }
  .form-group h2 .tag {
    font-size: 11px; background: #333; color: #aaa; padding: 2px 8px; border-radius: 10px;
  }
  .form-group .desc { font-size: 13px; color: #888; margin-bottom: 12px; }

  /* Selected display */
  .selected-area {
    display: flex; align-items: flex-start; gap: 20px; margin-bottom: 16px;
    background: #16213e; border-radius: 8px; padding: 16px;
  }
  .selected-left {
    display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  .selected-left-top {
    display: flex; align-items: flex-start; gap: 12px;
  }
  .selected-img {
    width: 192px; height: 192px; object-fit: contain; border: 3px solid #e94560;
    border-radius: 8px; background: #222; image-rendering: auto; flex-shrink: 0;
  }
  .selected-info { flex: 1; }
  .selected-info h3 { font-size: 14px; color: #e94560; margin-bottom: 8px; }

  /* Previous stage reference */
  .prev-stage {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .prev-stage img {
    width: 192px; height: 192px; object-fit: contain; border: 2px solid #555;
    border-radius: 8px; background: #222; image-rendering: auto;
  }
  .prev-stage .prev-label {
    font-size: 11px; color: #888; text-align: center; white-space: nowrap;
  }
  .prev-arrow { color: #555; font-size: 24px; align-self: center; }

  /* Devolution tree overview — top-down */
  .devo-tree {
    background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 32px;
    border: 1px solid #333; overflow-x: auto;
  }
  .devo-tree h2 { font-size: 15px; color: #888; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  .devo-tree-layout { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .devo-tree-row { display: flex; justify-content: center; align-items: flex-start; gap: 12px; position: relative; }
  .devo-tree-branch { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; position: relative; }
  .devo-tree-branch img {
    width: 96px; height: 96px; object-fit: contain; border-radius: 8px;
    background: #222; image-rendering: auto; border: 2px solid #333;
    cursor: pointer; transition: border-color 0.15s, transform 0.15s;
  }
  .devo-tree-branch img:hover { border-color: #e94560; transform: scale(1.08); }
  .devo-tree-branch .tree-name { font-size: 10px; color: #aaa; text-align: center; max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .devo-tree-branch .tree-role { font-size: 9px; color: #666; }
  .devo-tree-line-v { width: 2px; height: 20px; background: #444; margin: 0 auto; }
  .devo-tree-lines { position: relative; height: 20px; margin: 0 auto; }
  .devo-tree-group-d1 { display: flex; justify-content: center; gap: 24px; }
  .devo-tree-d1-col { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .devo-tree-d2-row { display: flex; justify-content: center; gap: 8px; }
  .devo-tree-lines-canvas { display: block; }
  .stat-row { font-size: 13px; color: #aaa; margin: 2px 0; }
  .stat-row span { color: #fff; }

  /* Candidates grid */
  .candidates-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .candidates-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 8px;
  }
  .candidate-card {
    position: relative; cursor: pointer; border: 2px solid transparent;
    border-radius: 6px; overflow: hidden; transition: all 0.15s; background: #111;
  }
  .candidate-card:hover { border-color: #e94560; transform: scale(1.05); }
  .candidate-card.is-selected { border-color: #4caf50; }
  .candidate-card img {
    width: 100%; height: 128px; object-fit: contain; display: block;
    background: #1a1a1a; image-rendering: auto;
  }
  .candidate-card img.flipped { transform: scaleX(-1); }
  .candidate-card .card-actions {
    position: absolute; top: 4px; left: 4px; display: flex; gap: 4px;
  }
  .flip-btn {
    width: 22px; height: 22px; border: none; border-radius: 4px;
    background: rgba(0,0,0,0.6); color: #ccc; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .candidate-card:hover .flip-btn { opacity: 1; }
  .flip-btn:hover { background: #e94560; color: #fff; }
  .flip-btn.active { background: #e94560; color: #fff; opacity: 1; }
  .candidate-card .label {
    font-size: 10px; color: #888; text-align: center; padding: 2px;
    background: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .candidate-card .check {
    position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
    background: #4caf50; border-radius: 50%; display: none; align-items: center;
    justify-content: center; font-size: 12px; color: #fff;
  }
  .candidate-card.is-selected .check { display: flex; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: #1a1a2e; border-radius: 12px; padding: 24px; max-width: 600px; text-align: center;
  }
  .modal-content img {
    max-width: 512px; max-height: 512px; image-rendering: auto;
    border-radius: 8px; margin-bottom: 16px; background: #222;
  }
  .modal-content .actions { display: flex; gap: 12px; justify-content: center; }
  .btn {
    padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; transition: background 0.15s;
  }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #c73a52; }
  .btn-cancel { background: #333; color: #ccc; }
  .btn-cancel:hover { background: #444; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
    background: #4caf50; color: #fff; border-radius: 8px; font-size: 14px;
    opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Hover preview */
  .hover-preview {
    position: fixed; z-index: 300; pointer-events: none;
    width: 512px; height: 512px; object-fit: contain;
    background: #111; border: 2px solid #e94560; border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    opacity: 0; transition: opacity 0.12s;
    image-rendering: auto;
  }
  .hover-preview.show { opacity: 1; }

  /* Action stats */
  .actions-table { margin-top: 8px; }
  .actions-table table {
    border-collapse: collapse; width: 100%; font-size: 12px;
  }
  .actions-table th, .actions-table td {
    padding: 4px 8px; border: 1px solid #333; text-align: left;
  }
  .actions-table th { background: #1a3a5c; color: #ccc; }

  /* Info panel — contextual monster data */
  .info-panel {
    background: #0d1117; border: 1px solid #333; border-radius: 8px;
    padding: 14px; margin-top: 8px; font-size: 12px; line-height: 1.6;
  }
  .info-panel .info-desc {
    color: #8b949e; font-style: italic; margin-bottom: 8px; padding: 8px;
    background: #161b22; border-radius: 6px; border-left: 3px solid #e94560;
  }
  .info-panel .info-image-desc {
    color: #a5d6ff; margin-bottom: 10px; padding: 8px;
    background: #161b22; border-radius: 6px; border-left: 3px solid #58a6ff;
    font-size: 11px;
  }
  .info-panel .info-image-desc::before {
    content: 'IMAGE REF'; display: block; font-size: 9px; color: #58a6ff;
    font-weight: bold; letter-spacing: 1px; margin-bottom: 4px; font-style: normal;
  }
  .info-section { margin-bottom: 10px; }
  .info-section-title {
    font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px; font-weight: bold;
  }

  /* Stat bars */
  .stat-bars { display: grid; grid-template-columns: 70px 1fr 30px; gap: 3px; align-items: center; }
  .stat-bars .stat-label { font-size: 11px; color: #888; text-align: right; padding-right: 6px; }
  .stat-bars .stat-bar-bg {
    height: 14px; background: #1a1a2e; border-radius: 3px; overflow: hidden;
  }
  .stat-bars .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .stat-bars .stat-val { font-size: 11px; color: #fff; text-align: center; }
  .fill-gentleness { background: #4caf50; }
  .fill-empathy { background: #2196f3; }
  .fill-resilience { background: #ff9800; }
  .fill-agility { background: #e91e63; }

  /* Color swatches */
  .color-swatches { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .color-swatch {
    display: flex; align-items: center; gap: 4px; font-size: 11px; color: #aaa;
  }
  .color-dot {
    width: 16px; height: 16px; border-radius: 50%; border: 1px solid #555;
  }

  /* Wild mechanic badge */
  .wild-mechanic {
    background: #2a1a2e; border: 1px solid #6a3a6e; border-radius: 6px;
    padding: 8px 10px; font-size: 11px; color: #dda0dd;
  }
  .wild-mechanic .wm-name { font-weight: bold; color: #ee82ee; }

  /* Skill cards */
  .skill-cards { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-card {
    background: #161b22; border: 1px solid #333; border-radius: 6px;
    padding: 8px 10px; font-size: 11px; min-width: 180px; flex: 1;
  }
  .skill-card .sk-name { font-weight: bold; color: #fff; font-size: 12px; }
  .skill-card .sk-axis { color: #58a6ff; }
  .skill-card .sk-cat { color: #7ee787; text-transform: capitalize; }
  .skill-card .sk-row { color: #aaa; margin-top: 2px; }
  .skill-card .sk-row span { color: #fff; }
  .skill-card .sk-log { color: #8b949e; font-style: italic; margin-top: 4px; font-size: 10px; }
  .skill-card .sk-effects { color: #f2cc60; font-size: 10px; }

  /* Role badge */
  .role-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .role-attacker { background: #3d1a1a; color: #ff6b6b; border: 1px solid #ff6b6b; }
  .role-tank { background: #1a2d3d; color: #6bb3ff; border: 1px solid #6bb3ff; }
  .role-support { background: #1a3d1a; color: #6bff6b; border: 1px solid #6bff6b; }
  .role-speedster { background: #3d3d1a; color: #ffff6b; border: 1px solid #ffff6b; }

  /* Quick stats row */
  .quick-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .quick-stat {
    font-size: 11px; color: #aaa; background: #161b22;
    padding: 3px 8px; border-radius: 4px;
  }
  .quick-stat span { color: #fff; font-weight: bold; }

  /* Mini tree (minimap per form-group) */
  .mini-tree {
    display: flex; flex-direction: column; align-items: center;
    background: #0d1117; border: 1px solid #333; border-radius: 8px;
    padding: 8px 12px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    position: relative; flex-shrink: 0;
  }
  .mini-tree:hover { border-color: #e94560; box-shadow: 0 0 12px rgba(233,69,96,0.3); }
  .mini-tree::after {
    content: 'Tree'; position: absolute; bottom: 2px; right: 4px;
    font-size: 7px; color: #555; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .mini-tree .mt-row { display: flex; justify-content: center; align-items: flex-start; gap: 4px; }
  .mini-tree .mt-col { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .mini-tree .mt-d2-row { display: flex; gap: 2px; }
  .mini-tree .mt-node {
    width: 28px; height: 28px; border-radius: 4px; object-fit: contain;
    background: #222; border: 1.5px solid #333; flex-shrink: 0;
  }
  .mini-tree .mt-node.mt-current {
    border-color: #e94560; box-shadow: 0 0 6px rgba(233,69,96,0.6);
  }
  .mini-tree .mt-node.mt-empty { opacity: 0.25; }
  .mini-tree .mt-line { width: 1px; height: 6px; background: #444; margin: 0 auto; }
  .mini-tree .mt-lines-h {
    height: 1px; background: #444; align-self: stretch; margin: 0 8px;
  }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>Candidates</h2>
</div>

<div class="main" id="main">
  <div style="color:#666; padding: 60px; text-align:center; font-size: 18px;">
    &larr; 왼쪽에서 몬스터를 선택하세요
  </div>
</div>

<!-- Override confirm modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px; color:#e94560;">이미지 교체 확인</h3>
    <div style="display:flex; gap:16px; justify-content:center; align-items:center; margin-bottom:16px;">
      <div>
        <div style="font-size:11px; color:#888; margin-bottom:4px;">현재 선택</div>
        <img id="modal-old" style="width:192px; height:192px; object-fit:contain;">
      </div>
      <div style="font-size:24px; color:#e94560;">&rarr;</div>
      <div>
        <div style="font-size:11px; color:#888; margin-bottom:4px;">새 선택</div>
        <img id="modal-new" style="width:192px; height:192px; object-fit:contain;">
        <div style="margin-top:4px; font-size:11px; color:#e94560; display:none;" id="modal-flip-label">좌우 반전 적용됨</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="modal-confirm">교체하기</button>
      <button class="btn btn-cancel" id="modal-cancel">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<img class="hover-preview" id="hover-preview" />

<script>
const API = '';
let candidates = [];
let currentDir = null;
let pendingOverride = null;

// ---- Helpers ----
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function imgUrl(dir, folder, file) {
  return `${API}/img/${encodeURIComponent(dir)}/${folder}/${encodeURIComponent(file)}`;
}

// Derive selected filename from an all_images filename
// e.g. "base_howl_wolf_3.png" -> "base_howl_wolf.png"
function toSelectedName(allImgFile) {
  return allImgFile.replace(/_(\d+)\.png$/, '.png');
}

// Group all_images by form (base name without trailing _N)
function groupByForm(files) {
  const groups = {};
  for (const f of files) {
    const key = toSelectedName(f);
    if (!groups[key]) groups[key] = [];
    groups[key].push(f);
  }
  return groups;
}

// ---- Load candidates list ----
async function loadCandidates() {
  const res = await fetch(`${API}/api/candidates`);
  candidates = await res.json();
  renderSidebar();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<h2>Candidates</h2>';
  for (const c of candidates) {
    const btn = document.createElement('button');
    btn.className = 'monster-btn';
    const name = c.concept?.base?.name_kr || c.dir;
    const nameEn = c.concept?.base?.name_en || '';
    btn.innerHTML = `${c.dir.split('_')[0]} ${name}<br><span class="sub">${nameEn}</span>`;
    btn.onclick = () => selectMonster(c.dir);
    sb.appendChild(btn);
  }
}

// ---- Select & render monster ----
async function selectMonster(dir) {
  currentDir = dir;

  // Highlight sidebar
  document.querySelectorAll('.monster-btn').forEach((b, i) => {
    b.classList.toggle('active', candidates[i].dir === dir);
  });

  const cand = candidates.find(c => c.dir === dir);
  const concept = cand.concept;
  const roster = cand.roster;

  const [allImages, selected] = await Promise.all([
    fetch(`${API}/api/candidates/${encodeURIComponent(dir)}/all-images`).then(r => r.json()),
    fetch(`${API}/api/candidates/${encodeURIComponent(dir)}/selected`).then(r => r.json()),
  ]);

  const groups = groupByForm(allImages);
  const selectedSet = new Set(selected);

  const main = document.getElementById('main');
  main.innerHTML = '';

  // Title
  const title = document.createElement('h1');
  title.style.cssText = 'margin-bottom:24px; font-size:24px;';
  title.textContent = `${concept?.base?.name_kr || dir} (${concept?.base?.name_en || ''})`;
  main.appendChild(title);

  // Devolution tree overview
  const devoTreeEl = buildDevoTree(dir, concept, selectedSet, allImages);
  devoTreeEl.id = 'devo-tree-main';
  main.appendChild(devoTreeEl);

  // Render each form group
  for (const [selectedFile, variants] of Object.entries(groups)) {
    const group = document.createElement('div');
    group.className = 'form-group';

    // Determine form info
    const formInfo = getFormInfo(selectedFile, concept, roster);

    // Header
    const h2 = document.createElement('h2');
    h2.innerHTML = `${formInfo.label} <span class="tag">${formInfo.tag}</span>`;
    group.appendChild(h2);
    if (formInfo.desc) {
      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = formInfo.desc;
      group.appendChild(desc);
    }

    // Selected image display
    const selArea = document.createElement('div');
    selArea.className = 'selected-area';
    const isSelected = selectedSet.has(selectedFile);
    const selImgSrc = isSelected
      ? imgUrl(dir, 'selected', selectedFile)
      : imgUrl(dir, 'all_images', variants[0]);

    // Build previous stage reference HTML
    let prevHtml = '';
    const prevStages = getPrevStages(selectedFile, dir, selectedSet, concept);
    if (prevStages.length > 0) {
      const prevItems = prevStages.map(p => `
        <div class="prev-stage">
          <img src="${p.src}" title="${p.name}" />
          <div class="prev-label">${p.label}</div>
        </div>
      `).join('<div class="prev-arrow">&rarr;</div>');
      prevHtml = prevItems + '<div class="prev-arrow">&rarr;</div>';
    }

    selArea.innerHTML = `
      <div class="selected-left">
        <div class="selected-left-top">
          ${prevHtml}
          <img class="selected-img" id="sel-${selectedFile}" src="${selImgSrc}" />
        </div>
      </div>
      <div class="selected-info">
        <h3>${isSelected ? selectedFile : '(선택 없음)'}</h3>
        ${formInfo.statsHtml}
      </div>
    `;
    const miniTree = buildMiniTree(dir, concept, selectedSet, allImages, selectedFile);
    selArea.querySelector('.selected-left').appendChild(miniTree);
    group.appendChild(selArea);

    // Candidate grid
    const label = document.createElement('div');
    label.className = 'candidates-label';
    label.textContent = `후보 이미지 (${variants.length}개) — 클릭하여 교체`;
    group.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'candidates-grid';

    // Sort variants numerically
    variants.sort((a, b) => {
      const na = parseInt(a.match(/_(\d+)\.png$/)?.[1] || '0');
      const nb = parseInt(b.match(/_(\d+)\.png$/)?.[1] || '0');
      return na - nb;
    });

    for (const v of variants) {
      const card = document.createElement('div');
      card.className = 'candidate-card';
      card.innerHTML = `
        <div class="card-actions">
          <button class="flip-btn" title="좌우 반전 (원본 저장)">&#8646;</button>
        </div>
        <img src="${imgUrl(dir, 'all_images', v)}" loading="lazy" />
        <div class="label">${v.replace(/_(\d+)\.png$/, ' #$1')}</div>
        <div class="check">&#10003;</div>
      `;
      const img = card.querySelector('img');
      const flipBtn = card.querySelector('.flip-btn');
      flipBtn.onclick = (e) => {
        e.stopPropagation();
        flipAndSave(dir, v, img, flipBtn);
      };
      card.onclick = () => confirmOverride(dir, v, selectedFile);
      grid.appendChild(card);
    }
    group.appendChild(grid);
    main.appendChild(group);
  }
}

function getFormInfo(selectedFile, concept, roster) {
  const info = { label: selectedFile, tag: '', desc: '', statsHtml: '' };

  if (selectedFile.startsWith('base_')) {
    const b = concept?.base;
    const rw = roster?.wild;
    const data = b || rw || {};
    info.label = data.name_kr || 'Base';
    info.tag = 'Wild';
    info.desc = data.desc_kr || '';
    info.statsHtml = buildBaseInfoPanel(data, rw);
  } else {
    const devoMatch = selectedFile.match(/^(devo[12])_(\d+)_(.+)\.png$/);
    if (!devoMatch) return info;
    const [, level, idx, name] = devoMatch;
    const i = parseInt(idx);

    if (level === 'devo1') {
      const cd = concept?.devolutions_1?.[i];
      const rd = roster?.devo1?.[i];
      const data = cd || rd || {};
      info.label = data.name_kr || name;
      info.tag = `Devo1 #${idx}`;
      info.desc = data.desc_kr || '';
      info.statsHtml = buildDevo1InfoPanel(data, rd);
    } else {
      // devo2: filename is devo2_{parentIdx}_{siblingIdx}_{name}.png
      const d2Match = selectedFile.match(/^devo2_(\d+)_(\d+)_(.+)\.png$/);
      let data = null;
      if (d2Match) {
        const [, parentIdx, sibIdx] = d2Match;
        // Try roster nested structure first
        data = roster?.devo1?.[parseInt(parentIdx)]?.devo2?.[parseInt(sibIdx)];
        // Fallback to concept flat structure
        if (!data) {
          const flatIdx = parseInt(parentIdx) * 2 + parseInt(sibIdx);
          data = concept?.devolutions_2?.[flatIdx];
        }
      }
      if (!data) {
        // Try concept flat index
        data = concept?.devolutions_2?.[i];
      }
      data = data || {};
      info.label = data.name_kr || name;
      info.tag = `Devo2`;
      info.desc = data.desc_kr || '';
      info.statsHtml = buildDevo2InfoPanel(data);
    }
  }
  return info;
}

// ---- Info panel builders ----
function roleBadge(role) {
  if (!role) return '';
  const cls = `role-${role}`;
  return `<span class="role-badge ${cls}">${role}</span>`;
}

function statBars(stats, maxVal) {
  if (!stats) return '';
  maxVal = maxVal || 20;
  const entries = [
    ['Gentleness', stats.gentleness, 'gentleness'],
    ['Empathy', stats.empathy, 'empathy'],
    ['Resilience', stats.resilience, 'resilience'],
    ['Agility', stats.agility, 'agility'],
  ];
  let html = '<div class="stat-bars">';
  for (const [label, val, key] of entries) {
    if (val == null) continue;
    const pct = Math.min(100, (val / maxVal) * 100);
    html += `
      <div class="stat-label">${label}</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill fill-${key}" style="width:${pct}%"></div></div>
      <div class="stat-val">${val}</div>
    `;
  }
  html += '</div>';
  return html;
}

function colorSwatches(colors) {
  if (!colors) return '';
  const colorMap = {
    '숯 검정': '#2d2d2d', '한밤 파랑': '#191970', '은빛': '#c0c0c0',
    '석탄 갈색': '#3d2b1f', '호박빛 주황': '#ff7f00', '연기 회색': '#848482',
    '독 보라': '#6a0dad', '부패 녹색': '#556b2f', '형광 노랑': '#ccff00',
    '습지 녹갈': '#4a5d23', '독안개 보라': '#8b008b', '형광 연두': '#7fff00',
    '키틴 갈색': '#6b4423', '독침 자주': '#800080', '경고 노랑': '#ffd700',
    '황혼 자주': '#5d3a6e', '안개 보라': '#9370db', '달빛 은색': '#d3d3d3',
  };
  const items = [
    ['primary', colors.primary],
    ['secondary', colors.secondary],
    ['accent', colors.accent],
  ];
  let html = '<div class="color-swatches">';
  for (const [type, name] of items) {
    if (!name) continue;
    const bg = colorMap[name] || '#555';
    html += `<div class="color-swatch"><div class="color-dot" style="background:${bg}"></div>${name}</div>`;
  }
  html += '</div>';
  return html;
}

function imageDescBox(visual) {
  if (!visual?.image_desc) return '';
  return `<div class="info-image-desc">${escapeHtml(visual.image_desc)}</div>`;

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---- Mini tree (minimap per form-group) ----
function buildMiniTree(dir, concept, selectedSet, allImages, currentFile) {
  const selArr = Array.from(selectedSet);
  const allArr = allImages || [];

  function findFile(prefix) {
    const sel = selArr.find(f => f.startsWith(prefix));
    if (sel) return { file: sel, folder: 'selected', found: true };
    const allMatch = allArr.find(f => toSelectedName(f).startsWith(prefix));
    if (allMatch) return { file: allMatch, folder: 'all_images', found: false };
    return null;
  }

  function collectByPrefix(prefix) {
    const matched = new Set();
    for (const f of selArr) { if (f.startsWith(prefix)) matched.add(f); }
    for (const f of allArr) { const s = toSelectedName(f); if (s.startsWith(prefix)) matched.add(s); }
    return Array.from(matched).sort();
  }

  function isCurrent(prefix) {
    return currentFile.startsWith(prefix);
  }

  function makeNode(fileInfo, prefix) {
    const img = document.createElement('img');
    img.className = 'mt-node';
    if (fileInfo) {
      img.src = imgUrl(dir, fileInfo.folder, fileInfo.file) + '?t=' + Date.now();
      if (!fileInfo.found) img.classList.add('mt-empty');
    } else {
      img.classList.add('mt-empty');
    }
    if (isCurrent(prefix)) img.classList.add('mt-current');
    return img;
  }

  function makeLine() {
    const l = document.createElement('div');
    l.className = 'mt-line';
    return l;
  }

  const wrap = document.createElement('div');
  wrap.className = 'mini-tree';
  wrap.title = 'Devolution Tree (Click to scroll)';
  wrap.onclick = () => {
    const mainTree = document.getElementById('devo-tree-main');
    if (mainTree) mainTree.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // Base
  const baseFile = findFile('base_');
  wrap.appendChild(makeNode(baseFile, 'base_'));
  wrap.appendChild(makeLine());

  // Devo1 row
  const devo1s = concept?.devolutions_1 || [];
  const devo1Files = collectByPrefix('devo1_');
  const d1Count = Math.max(devo1s.length, devo1Files.length);

  if (d1Count > 0) {
    const d1Row = document.createElement('div');
    d1Row.className = 'mt-row';

    for (let i = 0; i < d1Count; i++) {
      const col = document.createElement('div');
      col.className = 'mt-col';

      const d1File = findFile(`devo1_${i}_`);
      col.appendChild(makeNode(d1File, `devo1_${i}_`));
      col.appendChild(makeLine());

      // Devo2 row
      const d2Row = document.createElement('div');
      d2Row.className = 'mt-d2-row';
      let d2Files = collectByPrefix(`devo2_${i}_`);

      if (d2Files.length === 0) {
        const devo2s = concept?.devolutions_2 || [];
        const perD1 = devo1s.length > 0 ? Math.ceil(devo2s.length / devo1s.length) : 0;
        for (let j = 0; j < perD1; j++) {
          const flatIdx = i * perD1 + j;
          if (flatIdx >= devo2s.length) break;
          const d2File = findFile(`devo2_${flatIdx}_`);
          d2Row.appendChild(makeNode(d2File, `devo2_${flatIdx}_`));
        }
      } else {
        for (let j = 0; j < d2Files.length; j++) {
          const d2File = findFile(`devo2_${i}_${j}_`);
          d2Row.appendChild(makeNode(d2File, `devo2_${i}_${j}_`));
        }
      }

      col.appendChild(d2Row);
      d1Row.appendChild(col);
    }
    wrap.appendChild(d1Row);
  }

  return wrap;
}

// ---- Devolution tree overview ----
function buildDevoTree(dir, concept, selectedSet, allImages) {
  const tree = document.createElement('div');
  tree.className = 'devo-tree';
  tree.innerHTML = '<h2>Devolution Tree</h2>';

  // Build list of actual selected filenames grouped by prefix
  const selArr = Array.from(selectedSet);
  const allArr = allImages || [];

  // Find actual files by prefix pattern (e.g. "base_", "devo1_0_", "devo2_1_0_")
  function findFile(prefix) {
    // First try selected
    const sel = selArr.find(f => f.startsWith(prefix));
    if (sel) return { file: sel, folder: 'selected', found: true };
    // Fallback: find from all_images (strip _N suffix to match)
    const allMatch = allArr.find(f => toSelectedName(f).startsWith(prefix));
    if (allMatch) return { file: allMatch, folder: 'all_images', found: false };
    return null;
  }

  // Collect actual devo1 and devo2 files from selected+allImages
  function collectByPrefix(prefix) {
    // Gather unique selected names matching prefix
    const matched = new Set();
    for (const f of selArr) {
      if (f.startsWith(prefix)) matched.add(f);
    }
    for (const f of allArr) {
      const sel = toSelectedName(f);
      if (sel.startsWith(prefix)) matched.add(sel);
    }
    return Array.from(matched).sort();
  }

  function makeNode(fileInfo, label, sublabel) {
    const branch = document.createElement('div');
    branch.className = 'devo-tree-branch';
    const img = document.createElement('img');
    if (fileInfo) {
      img.src = imgUrl(dir, fileInfo.folder, fileInfo.file) + '?t=' + Date.now();
      if (!fileInfo.found) img.style.opacity = '0.3';
      img.title = fileInfo.file;
      const scrollTarget = fileInfo.found ? fileInfo.file : toSelectedName(fileInfo.file);
      img.onclick = () => {
        const target = document.getElementById('sel-' + scrollTarget);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      };
    } else {
      img.style.opacity = '0.3';
      img.title = label;
    }
    branch.appendChild(img);
    const nameEl = document.createElement('div');
    nameEl.className = 'tree-name';
    nameEl.textContent = label;
    branch.appendChild(nameEl);
    if (sublabel) {
      const roleEl = document.createElement('div');
      roleEl.className = 'tree-role';
      roleEl.textContent = sublabel;
      branch.appendChild(roleEl);
    }
    return branch;
  }

  function makeLineV() {
    const l = document.createElement('div');
    l.className = 'devo-tree-line-v';
    return l;
  }

  // Top-down layout:
  //           [base]
  //              │
  //    ┌─────────┼─────────┐
  //  [d1-A]    [d1-B]    [d1-C]
  //   ┌─┐      ┌─┐      ┌─┐
  // [A1][A2] [B1][B2] [C1][C2]

  const layout = document.createElement('div');
  layout.className = 'devo-tree-layout';

  // Row 0: Base — find any file starting with "base_"
  const baseFile = findFile('base_');
  const baseLabel = concept?.base?.name_kr || 'Wild';
  layout.appendChild(makeNode(baseFile, baseLabel, 'wild'));

  // Connector line down
  layout.appendChild(makeLineV());

  // Collect devo1 files from actual filesystem
  const devo1Files = collectByPrefix('devo1_');
  const devo1s = concept?.devolutions_1 || [];

  // Row 1: Devo1 with connector lines drawn via canvas
  const d1Row = document.createElement('div');
  d1Row.className = 'devo-tree-group-d1';

  // Each devo1 column (devo1 + its devo2s)
  const d1Count = Math.max(devo1s.length, devo1Files.length);
  for (let i = 0; i < d1Count; i++) {
    const d1Concept = devo1s[i];
    const col = document.createElement('div');
    col.className = 'devo-tree-d1-col';

    // Devo1 node — find file matching "devo1_{i}_"
    const d1FileInfo = findFile(`devo1_${i}_`);
    const d1Label = d1Concept?.name_kr || d1Concept?.name_en || (d1FileInfo?.file || `devo1_${i}`);
    col.appendChild(makeNode(d1FileInfo, d1Label, d1Concept?.role));

    // Line down to devo2
    col.appendChild(makeLineV());

    // Devo2 row — find files matching "devo2_{i}_{j}_"
    const d2Row = document.createElement('div');
    d2Row.className = 'devo-tree-d2-row';
    const d2Files = collectByPrefix(`devo2_${i}_`);
    for (let j = 0; j < d2Files.length; j++) {
      const d2FileInfo = findFile(`devo2_${i}_${j}_`);
      // Extract label from concept or filename
      const d2Match = d2Files[j]?.match(/^devo2_\d+_\d+_(.+)\.png$/);
      const d2NameFromFile = d2Match ? d2Match[1] : `devo2_${i}_${j}`;
      const d2Label = d2NameFromFile.replace(/_/g, ' ');
      d2Row.appendChild(makeNode(d2FileInfo, d2Label));
    }
    // If no d2 files found, try flat index pattern (devo2_{flatIdx}_)
    if (d2Files.length === 0) {
      const devo2s = concept?.devolutions_2 || [];
      const devo2PerDevo1 = devo1s.length > 0 ? Math.ceil(devo2s.length / devo1s.length) : 0;
      for (let j = 0; j < devo2PerDevo1; j++) {
        const flatIdx = i * devo2PerDevo1 + j;
        if (flatIdx >= devo2s.length) break;
        const d2FileInfo = findFile(`devo2_${flatIdx}_`);
        const d2Concept = devo2s[flatIdx];
        const d2Label = d2Concept?.name_kr || d2Concept?.name_en || `devo2_${flatIdx}`;
        d2Row.appendChild(makeNode(d2FileInfo, d2Label));
      }
    }
    col.appendChild(d2Row);

    d1Row.appendChild(col);
  }

  // Draw horizontal bracket line between devo1 columns using a canvas
  const linesDiv = document.createElement('div');
  linesDiv.className = 'devo-tree-lines';
  linesDiv.style.width = '100%';
  layout.appendChild(linesDiv);
  layout.appendChild(d1Row);

  // After render, draw bracket lines with canvas
  requestAnimationFrame(() => {
    const cols = d1Row.querySelectorAll('.devo-tree-d1-col');
    if (cols.length < 2) {
      // Single column — just a vertical line
      linesDiv.innerHTML = '';
      linesDiv.appendChild(makeLineV());
      return;
    }
    const parentRect = linesDiv.getBoundingClientRect();
    const rects = Array.from(cols).map(c => c.getBoundingClientRect());
    const canvas = document.createElement('canvas');
    canvas.className = 'devo-tree-lines-canvas';
    canvas.width = parentRect.width;
    canvas.height = 20;
    canvas.style.width = '100%';
    canvas.style.height = '20px';
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;

    // Horizontal line spanning first to last devo1 center
    const centers = rects.map(r => r.left + r.width / 2 - parentRect.left);
    ctx.beginPath();
    ctx.moveTo(centers[0], 0);
    ctx.lineTo(centers[centers.length - 1], 0);
    ctx.stroke();

    // Vertical ticks down from each center
    for (const cx of centers) {
      ctx.beginPath();
      ctx.moveTo(cx, 0);
      ctx.lineTo(cx, 20);
      ctx.stroke();
    }

    // Center vertical line from top (parent connector)
    const mid = parentRect.width / 2;
    ctx.beginPath();
    ctx.moveTo(mid, 0);
    ctx.lineTo(mid, 0);
    ctx.stroke();

    linesDiv.innerHTML = '';
    linesDiv.appendChild(canvas);
  });

  tree.appendChild(layout);
  return tree;
}

// ---- Previous stage lookup ----
// Find actual file from selectedSet by prefix
function findSelectedByPrefix(selectedSet, prefix) {
  for (const f of selectedSet) {
    if (f.startsWith(prefix)) return f;
  }
  return null;
}

function getPrevStages(selectedFile, dir, selectedSet, concept) {
  const stages = [];

  if (selectedFile.startsWith('devo1_')) {
    // devo1 → show base
    const baseName = findSelectedByPrefix(selectedSet, 'base_');
    if (baseName) {
      stages.push({
        src: imgUrl(dir, 'selected', baseName),
        label: concept?.base?.name_kr || 'Wild',
        name: baseName,
      });
    }
  } else if (selectedFile.startsWith('devo2_')) {
    // devo2 → show base + parent devo1
    // Extract parent devo1 index: devo2_{parentIdx}_{siblingIdx}_...
    const devoMatch = selectedFile.match(/^devo2_(\d+)_/);
    const parentDevo1Idx = devoMatch ? devoMatch[1] : null;

    // base
    const baseName = findSelectedByPrefix(selectedSet, 'base_');
    if (baseName) {
      stages.push({
        src: imgUrl(dir, 'selected', baseName),
        label: concept?.base?.name_kr || 'Wild',
        name: baseName,
      });
    }

    // parent devo1
    if (parentDevo1Idx !== null) {
      const devo1Name = findSelectedByPrefix(selectedSet, `devo1_${parentDevo1Idx}_`);
      if (devo1Name) {
        const d1Concept = concept?.devolutions_1?.[parseInt(parentDevo1Idx)];
        stages.push({
          src: imgUrl(dir, 'selected', devo1Name),
          label: d1Concept?.name_kr || d1Concept?.name_en || devo1Name,
          name: devo1Name,
        });
      }
    }
  }

  return stages;
}

// ---- Flip & save to original ----
async function flipAndSave(dir, filename, imgEl, btn) {
  btn.textContent = '...';
  try {
    // Load image onto canvas and flip
    const image = new Image();
    image.crossOrigin = 'anonymous';
    image.src = imgUrl(dir, 'all_images', filename) + '?t=' + Date.now();
    await new Promise((resolve, reject) => { image.onload = resolve; image.onerror = reject; });

    const canvas = document.createElement('canvas');
    canvas.width = image.naturalWidth;
    canvas.height = image.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(image, 0, 0);

    const dataUrl = canvas.toDataURL('image/png');

    // Immediately update the displayed image
    imgEl.src = dataUrl;

    // Save flipped image back to all_images original file
    const res = await fetch(`${API}/api/candidates/${encodeURIComponent(dir)}/flip`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, imageData: dataUrl }),
    });
    const data = await res.json();
    if (data.ok) {
      toast(`반전 저장: ${filename}`);
    } else {
      toast(`오류: ${data.error}`);
    }
  } catch (err) {
    toast(`반전 실패: ${err.message}`);
  }
  btn.innerHTML = '&#8646;';
}

// ---- Override flow ----
function confirmOverride(dir, sourceFile, targetFile) {
  pendingOverride = { dir, source: sourceFile, target: targetFile };
  const modal = document.getElementById('modal');
  document.getElementById('modal-old').src = imgUrl(dir, 'selected', targetFile);
  document.getElementById('modal-new').src = imgUrl(dir, 'all_images', sourceFile) + '?t=' + Date.now();
  document.getElementById('modal-flip-label').style.display = 'none';
  modal.classList.add('show');
}

document.getElementById('modal-confirm').onclick = async () => {
  if (!pendingOverride) return;
  const { dir, source, target } = pendingOverride;
  const res = await fetch(`${API}/api/candidates/${encodeURIComponent(dir)}/override`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source, target }),
  });
  const data = await res.json();
  document.getElementById('modal').classList.remove('show');
  if (data.ok) {
    toast(`교체 완료: ${source} → ${target}`);
    selectMonster(dir);
  } else {
    toast(`오류: ${data.error}`);
  }
  pendingOverride = null;
};

document.getElementById('modal-cancel').onclick = () => {
  document.getElementById('modal').classList.remove('show');
  pendingOverride = null;
};

document.getElementById('modal').onclick = (e) => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
    pendingOverride = null;
  }
};

// ---- Hover preview ----
const hoverPreview = document.getElementById('hover-preview');
let hoverTimeout = null;

function showPreview(src, e) {
  clearTimeout(hoverTimeout);
  hoverPreview.src = src;
  positionPreview(e);
  hoverPreview.classList.add('show');
}

function positionPreview(e) {
  const pad = 16;
  const pw = 512, ph = 512;
  const vw = window.innerWidth, vh = window.innerHeight;
  let x, y;

  // Horizontal: prefer right of cursor, flip left if no room
  if (e.clientX + pad + pw < vw) {
    x = e.clientX + pad;
  } else {
    x = e.clientX - pad - pw;
  }

  // Vertical: center on cursor, clamp to viewport
  y = e.clientY - ph / 2;
  y = Math.max(pad, Math.min(y, vh - ph - pad));

  hoverPreview.style.left = x + 'px';
  hoverPreview.style.top = y + 'px';
}

function hidePreview() {
  hoverPreview.classList.remove('show');
  hoverPreview.src = '';
}

// Delegate hover events on images inside tree branches and candidate cards
document.addEventListener('mouseover', (e) => {
  const img = e.target;
  // Tree branch images
  if (img.tagName === 'IMG' && img.closest('.devo-tree-branch') && img.src) {
    showPreview(img.src, e);
    return;
  }
  // Candidate card images
  if (img.tagName === 'IMG' && img.closest('.candidate-card') && img.src) {
    showPreview(img.src, e);
    return;
  }
});

document.addEventListener('mousemove', (e) => {
  if (hoverPreview.classList.contains('show')) {
    positionPreview(e);
  }
});

document.addEventListener('mouseout', (e) => {
  const img = e.target;
  if (img.tagName === 'IMG' && (img.closest('.devo-tree-branch') || img.closest('.candidate-card'))) {
    hidePreview();
  }
});

// ---- Init ----
loadCandidates();
